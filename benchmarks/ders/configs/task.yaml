# ============================================================================
# DERs benchmark task definition (frozen).
#
# Distributed Energy Resources on case141: 12 cooperative agents
# (4 batteries + 4 PV + 4 flex-loads) controlling distinct buses.  Type-
# specific parameter-shared IPPO; all agents share a team reward and the
# voltage-violation cost channel.
#
# Companion file: provenance.json — auto-written by
# benchmarks/common/experiment_ops.py derive_target with the convergence target + reference
# run metadata.  Do NOT hand-edit provenance.json.
# ============================================================================

task: ders
case: case141                 # 141-bus Caracas distribution (registry 141; case141.m / Khodr 2008).
n_agents: 12

# Bus IDs by agent type.  Agent name format: "<type>_<idx>" (battery_0,
# pv_0, flexload_0, ...).  Order is significant: it pins the per-type
# ipv-typed actor-critic indexing in train.py.
agent_types:
  battery:  [9, 55, 17, 122]
  pv:       [6, 73, 72, 82]
  flexload: [41, 70, 135, 24]

max_steps: 48                 # 48 half-hour intervals = 24 h horizon
dt_hours: 0.5

# Voltage feasibility band; violations enter cost channel + reward shaping
# via voltage_penalty.
v_min: 0.94
v_max: 1.06
voltage_penalty: 4.0          # Canonical shared-reward shaping weight.

num_envs: 128                 # Canonical Phase-1 / Phase-2 training parallelism.

eval_splits: [train, iid, voltage_tightening, pv_penetration_shift, load_stress]
primary_split: iid

# Non-learning baselines.  baseline_set[0] (no_control) is the reference for
# derive_target IQM.  baseline_algos is a deprecated alias kept for older
# readers; both keys must agree until the alias is removed.
baseline_set:   [no_control, volt_droop]
baseline_algos: [no_control, volt_droop]

seeds: [0, 1, 2, 3, 4]
eval_episodes: 30

safety_thresholds:
  voltage_violation_rate: 0.0

benchmark_protocol:
  protocol_formalization_pending: false
  current_campaign_seed_budget: 5
  submission_min_seeds: 5
  required_statistics: [mean, std, iqm, bootstrap_ci95]
  hypothesis_test:
    name: paired_primary_split_test
    status: implemented
    implementation: benchmarks/ders/summarize.py::_build_hypothesis_tests
    metric: mean_p_loss_mw
    comparison_pairs:
      - [ippo, no_control]
      - [ippo, volt_droop]
      - [ippo_safe, no_control]
      - [ippo_safe, volt_droop]
      - [ippo_lagrangian, no_control]
      - [ippo_lagrangian, volt_droop]
    notes: "Paired sign-flip permutation tests on primary-split per_episode mean_p_loss_mw. Lower is better; negative left-minus-right favours the learned policy."
  leaderboard:
    split: iid
    primary_metric: mean_p_loss_mw
    direction: lower_is_better
    include_baselines: true

target_return_metric_key: mean_p_loss_mw
target_metric_direction: lower_is_better

notes: "Frozen task definition for DERs benchmark. baseline_set is the canonical key (P0-B rename); baseline_algos kept temporarily for backward-compat readers. seeds/eval_episodes define the submission-grade reporting budget; eval.py and baselines.py read eval_<split>.yaml where present, with eval_episodes as the canonical fallback. convergence_threshold_per_split / convergence_provenance / safety_thresholds populated by P0-E experiment_ops.py derive_target after the seed-0 pipeline."
