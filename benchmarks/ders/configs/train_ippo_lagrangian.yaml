# DERs typed IPPO-Lagrangian.
#
# Keeps the existing type-specific decentralized actors
# (battery_* / renewable_* / flexload_*) and adds:
#   * per-type local cost critics
#   * a shared team-level Lagrange multiplier over explicit env costs
#
# Important: reward/cost stay separated here, so voltage_penalty is disabled.
algo: ippo_typed_lagrangian
total_timesteps: 10000000
num_envs: 128
n_steps: 48
n_epochs: 4
hidden_dims: [128, 128]
gamma: 0.995
gae_lambda: 0.95
lr: 0.0001
clip_eps: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
eval_freq: 100000
record_eval_wall_time: true
voltage_penalty: 0.0
cost_thresholds: [0.0, 0.0, 0.0]
lambda_lr: 0.00005
notes: "DERs typed IPPO-Lagrangian on case141. Type-specific decentralized actors share a team-level dual variable over the explicit voltage_violation / thermal_overload / resource CMDP costs. Reward/cost separation is restored here (voltage_penalty=0.0), unlike reward-shaped ippo_safe. Initial setting mirrors typed IPPO's 10M-step budget and uses a conservative lambda_lr=5e-5 to avoid early dual spikes."
