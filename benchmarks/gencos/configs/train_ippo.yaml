# GenCos IPPO on case5 MarketMARLEnv (5 agents bidding via segmented offer
# curves).  algo='ippo' uses the self-implemented homogeneous IPPO (PureJax
# RL/Mava-style).  n_minibatches not used (full-batch updates).
algo: ippo
total_timesteps: 5000000
num_envs: 256
n_steps: 48
n_epochs: 4
hidden_dims: [128, 128]
gamma: 0.995
gae_lambda: 0.95
lr: 0.0003
clip_eps: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
eval_freq: 100000             # steps between eval calls; default 10k fires eval every update
                              # (steps_per_update=12288 > 10000). 100k = eval every ~8 updates.
data_split: train             # consumed by GencosTask, not TrainConfig
notes: "GenCos IPPO on case5 MarketMARLEnv, 5 agents bidding via segmented offer curves. algo='ippo' uses self-implemented IPPO; n_minibatches not used."
