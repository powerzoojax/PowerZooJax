# ============================================================================
# DC Microgrid benchmark task definition (frozen).
#
# Self-contained data-centre microgrid: PV + battery + diesel + critical
# IT load.  288 × 5-min steps = 24 h.  Single-agent multi-objective robust
# RL with reward shaping (no native CMDP wrapper).  See
# benchmarks/dc_microgrid/README.md for outputs and OOD scenarios.
#
# Companion file: provenance.json — auto-written by
# benchmarks/common/experiment_ops.py derive_target with the convergence target + reference
# run metadata.  Do NOT hand-edit provenance.json.
# ============================================================================

task: dc_microgrid
max_steps: 288                # 288 × 5 min = 24 h horizon
dt_minutes: 5
dt_hours: 0.08333             # = 5/60, kept for downstream code that expects hours

data_source: google           # Real Google workload; PV uses real GB solar trace; grid price uses GB MID market trace.

# Non-learning baselines.  baseline_set[0] (no_control) is the reference for
# derive_target IQM.
baseline_set: [no_control, max_renewable, rule_based]

# Two split tiers:
# - eval_splits / eval_splits_main → 4 splits used in the paper main table.
# - eval_splits_appendix → 4 extra OOD scenarios reported in the appendix.
eval_splits:           [train, iid, cooling_stress, renewable_drought]
eval_splits_main:      [train, iid, cooling_stress, renewable_drought]
eval_splits_appendix:  [workload_swap, workload_shock, dg_derating, sla_tighten]

# OOD scenario parameters consumed by tasks/dc_microgrid.py at episode
# build time.  Keys must match split names listed above.
ood_scenarios:
  cooling_stress:    { scenario: cooling_stress,    temp_delta: 5.0 }
  renewable_drought: { scenario: renewable_drought, drought_factor: 0.2 }
  workload_swap:     { scenario: workload_swap }
  workload_shock:    { scenario: workload_shock }
  dg_derating:       { scenario: dg_derating, dg_derating_factor: 0.6 }
  sla_tighten:       { scenario: sla_tighten, sla_slack: 1.2 }

num_envs: 256                 # Frozen training parallelism.

case_overrides:
  dg_p_max_mw: 1.2
  pv_p_max_mw: 0.8
  grid_import_p_max_mw: 1.5
  grid_price_ref_per_mwh: 150.0
  grid_carbon_kg_per_kwh: 0.18
  battery_soc_min: 0.15
  battery_soc_max: 0.90
  battery_soc_init: 0.55
  terminal_soc_target: 0.55
  terminal_soc_penalty: 20000.0
  w_cost: 0.2
  w_carbon: 0.1

# DG is benchmark-wrapped as a same-step residual slack actuator after
# workload, cooling, and battery decisions are realised.
dg_autobalance: true

# Reward-shaping multipliers subtracted from the base reward in
# benchmarks/dc_microgrid/_reward_shaping.py.
reward_shaping_weights:
  sla: 50.0
  overtemp: 30.0
  power_deficit: 200.0
  power_spill: 100.0
  dispatch_tracking: 40.0

primary_split: iid

seeds: [0, 1, 2, 3, 4]
eval_episodes: 10

safety_thresholds:
  sla_deficit_rate: 0.0

benchmark_protocol:
  submission_min_seeds: 5
  hypothesis_test:
    name: paired_episode_signflip_permutation
    status: implemented
    metric: episode_reward
    pairing: same seed + episode index on primary split
  leaderboard:
    split: iid
    primary_metric: episode_reward
    direction: higher_is_better

target_return_metric_key: episode_reward
target_metric_direction: higher_is_better

notes: "Frozen task definition for DC Microgrid benchmark (288x5min, Google workload, GB real solar generation trace normalized to PV capacity factor, GB MID market grid-import price trace, deterministic outdoor-temperature adapter, multi-objective robust RL). Main table uses 4 splits (eval_splits = eval_splits_main, P0-B canonical alias); all 6 OOD scenarios reported in appendix (eval_splits_appendix). Reward shaping converts the underlying CMDP to a plain MDP so vanilla PPO/SAC can learn constraint-aware policies. Current case calibration uses dg_p_max_mw=1.2, pv_p_max_mw=0.8, grid_import_p_max_mw=1.5, battery_soc_window=[0.15,0.90], terminal_soc_target=0.55, terminal_soc_penalty=20000, w_cost=0.2, w_carbon=0.1. Reward shaping uses lambda_deficit=200, lambda_spill=100, lambda_dispatch_tracking=40 with price-aware battery/DG dispatch targets. DG is benchmark-wrapped as a same-step load-following slack actuator because the DC sub-step realises load after workload/cooling actions; direct same-step DG setpoints otherwise create avoidable residual imbalance unrelated to the intended control tradeoff. Submission-grade protocol uses 5 seeds and a paired episode-level sign-flip permutation test on the primary split. convergence_threshold_per_split / convergence_provenance / safety_thresholds populated by P0-E experiment_ops.py derive_target after the seed-0 pipeline."
