# DSO unconstrained SAC (Rejax) on the same reward as PPO.
# Keep the budget and monitoring close to PPO so upper-bound learning curves
# remain comparable.
algo: sac
total_timesteps: 3000000
num_envs: 64
hidden_dims: [128, 128]
gamma: 0.995
lr: 0.0003
eval_episodes: 8
eval_num_episodes: 8
normalize_observations: true
normalize_rewards: false
record_eval_wall_time: true
wrapper: log
notes: "DSO unconstrained SAC (Rejax, LogWrapper); 3M steps, 64 envs, wall-time logging aligned with PPO-style upper-bound dashboards."
