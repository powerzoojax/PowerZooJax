# ============================================================================
# TSO benchmark task definition (frozen).
#
# Transmission-System Operator on case118 with 54 thermal units, GB net-load
# trace, 48-step (24 h) Security-Constrained Unit Commitment.  Single-agent
# Safe RL with continuous-relaxation SCUC.  See benchmarks/tso/README.md for
# baselines, splits, and outputs.
#
# Companion file: provenance.json — auto-written by
# benchmarks/common/experiment_ops.py derive_target with the convergence target + reference
# run metadata.  Do NOT hand-edit provenance.json.
# ============================================================================

task: tso
case: case118                 # IEEE 118-bus / 186-line transmission case
n_units: 54                   # Thermal units committed by SCUC
n_buses: 118
n_lines: 186
max_steps: 48                 # 48 half-hour intervals = 24 h horizon
dt_hours: 0.5

data_source: gb               # Real GB transmission demand & wind trace.
# Executable GB date-window declarations for the TSO benchmark.
# When omitted, runtime falls back to powerzoojax/data/splits.py frozen defaults.
gb_train_start: "2025-04-01"
gb_train_end: "2025-12-31"
gb_iid_start: "2026-01-01"
gb_iid_end: "2026-03-31"

num_envs: 1024                # Frozen throughput capacity only; train.py reads train_*.yaml::num_envs.

# SCUC reserve margin; reserve check enters cost channel.
reserve_margin_frac: 0.05
# Reward scale: raw cost is in £; scale 1e-4 keeps PPO returns O(10).
reward_scale: 0.0001
# Coefficient inside the thermal overload cost channel definition (c_1).
# Frozen at 1.0 for the benchmark.
cost_thermal_weight: 1.0
# Dispatch solver mode: 1 = continuous-relaxation DC-OPF (current frozen
# baseline).  Other values reserved for hybrid discrete/continuous heads.
solver_mode: 1
# Canonical DC-OPF redispatch settings for the current benchmark.
dcopf_max_iter: 200
dcopf_tol: 0.0001
# Rolling-UC observation includes a short perfect preview of future total load.
# 4 steps = 2 hours, matching the common coal min-up/down scale in case118.
forecast_horizon_steps: 4

# Non-learning baselines.  baseline_set[0] (all_on) is the reference for
# derive_target IQM (i.e. naïve "commit every unit" upper-bound on cost).
baseline_set: [all_on, merit_order]

eval_splits: [train, iid, load_stress, line_tightening]
primary_split: iid

seeds: [0, 1, 2, 3, 4]
eval_episodes: 50

safety_thresholds:
  reserve_shortfall_rate: 0.0
  thermal_violation_rate: 0.0

benchmark_protocol:
  benchmark_question: "Can a method lower SCUC operating cost without violating physical security, and does held-out IID strength transfer to peak-load and congestion OOD shifts?"
  current_campaign_start_iso: "2026-04-24T02:05:20+00:00"
  primary_algorithms: [ppo, ppo_lagrangian]
  current_campaign_seed_budget: 5
  submission_min_seeds: 5
  required_statistics: [mean, std, iqm, bootstrap_ci95]
  hypothesis_test:
    name: paired_wilcoxon_or_permutation
    status: implemented
    implementation: paired_signflip_permutation
    notes: "summarize.py runs paired sign-flip permutation tests on primary-split per-episode total_operating_cost for canonical jax_rejax+gpu rows."
  leaderboard:
    split: iid
    primary_metric: total_operating_cost
    direction: lower_is_better
    include_baselines: true
    require_safety_thresholds: [reserve_shortfall_rate, thermal_violation_rate]
    notes: "Unsafe policies are still reported, but they are not leaderboard-eligible on the primary split."

split_taxonomy:
  train:
    capability: optimization sanity check on the training distribution
    interpretation: "A large train gap usually indicates optimizer instability or under-training, not a generalization failure."
  iid:
    capability: routine day-ahead security dispatch on held-out same-regime demand windows
    interpretation: "Low IID performance means the method cannot solve standard SCUC reliably even before deliberate distribution shift."
  load_stress:
    capability: reserve adequacy and cost control under peak-demand stress
    interpretation: "IID-strong but load_stress-weak suggests brittle reserve margins or overly aggressive commitment trimming."
  line_tightening:
    capability: congestion-aware commitment and redispatch under reduced transfer headroom
    interpretation: "IID-strong but line_tightening-weak suggests the policy relies on uncongested merit-order patterns and lacks transmission-security robustness."

target_return_metric_key: total_operating_cost
target_metric_direction: lower_is_better

notes: "Frozen task definition for TSO-SCUC benchmark (case118, GB demand, continuous-relaxation SCUC). eval_episodes is the executable source for benchmark eval/baseline episode count; split-specific eval YAMLs only carry load/rating modifiers. train.py reads train_*.yaml for optimizer hyperparameters and num_envs; task.yaml::num_envs is throughput metadata for benchmark analysis only. submission-grade reporting is tracked separately in benchmark_protocol. convergence_threshold_per_split / convergence_provenance / safety_thresholds populated by P0-E experiment_ops.py derive_target after the seed-0 pipeline."
