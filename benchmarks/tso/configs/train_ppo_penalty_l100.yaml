# TSO Penalty PPO ablation — λ=100.
#
# Shaping: r' = r − penalty_lambda * reward_scale * Σ(costs)
#   reward_scale = 1e-4 (from task.yaml); CMDP costs in physical MW.
#   Effective coeff = 100 * 1e-4 = 1e-2.
#   Typical step reward ≈ −7.5; max penalty per violated step ≈ 5 — COMPARABLE regime:
#   penalty comparable in magnitude to reward → agent trades off cost vs feasibility.
#
# This is an ablation baseline demonstrating that static λ is insufficient.
# See ppo_penalty_l10 / ppo_penalty_l1000 for weaker / stronger penalty regimes.
algo: ppo
total_timesteps: 10000000
num_envs: 256
n_steps: 48
eval_freq: 100000
eval_episodes: 8
record_eval_wall_time: true
hidden_dims: [256, 256]
gamma: 0.995
gae_lambda: 0.95
lr: 0.0003
normalize_observations: true
wrapper: penalty
penalty_lambda: 100.0
notes: "Penalty PPO ablation λ=100 (TSO): r'=r−λ·reward_scale·Σ(c); effective coeff=1e-2; comparable — penalty ~same order as reward."
