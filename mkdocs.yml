    - Resources: en/api/resource.md
    - Microgrid: en/api/microgrid.md
    - Market Lite: en/api/market.md
    - Market SCED: en/api/market-sced.md
    - Market MARL: en/api/market-marl.md
    - Cases: en/api/case.md
